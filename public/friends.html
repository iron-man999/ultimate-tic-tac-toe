<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Friends</title>
  <style>
    :root {
      --bg: #111111;
      --text: #eee;
      --panel: #222;
      --border: #444;
      --button-bg: #444;
      --button-hover: #666;
      --accent: #2f7fff;
    }
    body {
      background:var(--bg);
      color:var(--text);
      font-family:system-ui;
      padding:20px;
      transition: background 0.6s ease;
    }
    input {
      background:var(--panel);
      border:1px solid var(--border);
      color:var(--text);
      padding:6px;
      margin-top:6px;
    }
    button {
      background:var(--button-bg);
      border:none;
      color:var(--text);
      padding:6px 12px;
      margin-left:6px;
      cursor:pointer;
      border-radius:4px;
    }
    button:hover { background:var(--button-hover); }
    .box {
      margin-top:20px;
      padding:10px;
      border:1px solid var(--border);
      border-radius:6px;
      background:var(--panel);
    }
    a {
      color:var(--accent);
      text-decoration:none;
    }
  </style>
</head>
<body>

<h1>Friends</h1>
<a href="/">← Back to game</a>

<div class="box">
  <h3>Add Friend</h3>
  <input id="friendName" placeholder="Username">
  <button onclick="sendRequest()">Send Request</button>
  <div id="reqStatus"></div>
</div>

<div class="box">
  <h3>Incoming Friend Requests</h3>
  <div id="incoming"></div>
</div>

<div class="box">
  <h3>Your Friends</h3>
  <div id="friends"></div>
</div>

<script>
const token = localStorage.getItem("authToken");

if (!token) {
  alert("You must be logged in.");
  window.location = "/";
}

function applySavedTheme() {
  const bg = localStorage.getItem("bgColor");
  const x = localStorage.getItem("xColor");
  const o = localStorage.getItem("oColor");
  if (bg) document.documentElement.style.setProperty("--bg", bg);
  if (x) document.documentElement.style.setProperty("--accent", x);
}
applySavedTheme();

async function loadFriends() {
  const res = await fetch("/api/friends/list", {
    headers: { "x-auth-token": token }
  });
  const data = await res.json();

  document.getElementById("incoming").innerHTML =
    data.incoming.map(u =>
      `<div>${u} <button onclick="accept('${u}')">Accept</button></div>`
    ).join("");

  document.getElementById("friends").innerHTML =
    data.friends.map(u =>
      `<div>${u} 
         <button onclick="challenge('${u}')">Challenge</button>
         <button onclick="viewProfile('${u}')">Profile</button>
       </div>`
    ).join("");
}

async function sendRequest() {
  const target = document.getElementById("friendName").value;
  const res = await fetch("/api/friends/request", {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-auth-token": token },
    body: JSON.stringify({ target })
  });
  const data = await res.json();
  document.getElementById("reqStatus").textContent = data.error || "Request sent";
  loadFriends();
}

async function accept(from) {
  await fetch("/api/friends/accept", {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-auth-token": token },
    body: JSON.stringify({ from })
  });
  loadFriends();
}

async function challenge(friend) {
  const res = await fetch("/api/challenge/send", {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-auth-token": token },
    body: JSON.stringify({ to: friend })
  });
  const data = await res.json();
  if (!res.ok) {
    alert(data.error || "Could not send challenge");
  } else {
    alert("Challenge sent!");
  }
}

function viewProfile(u) {
  window.location = `profile.html?user=${encodeURIComponent(u)}`;
}

loadFriends();
</script>

</body>
</html>
